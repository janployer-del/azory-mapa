<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Azory 2026 – Interaktivní mapa</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;0,9..144,800;1,9..144,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.css" />
<style>
  :root {
    --ink: #1a2332;
    --paper: #f4ede0;
    --ocean: #2a5969;
    --accent: #d4a147;
    --shadow: rgba(26, 35, 50, 0.15);
    --cat-ubytovani: #2a4a6b;
    --cat-turistika: #c89935;
    --cat-priroda: #1f5c2e;
    --cat-koupani: #0b7fb8;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; overflow: hidden; }
  body {
    font-family: 'Fraunces', Georgia, serif;
    color: var(--ink);
    background: var(--paper);
    display: flex;
    flex-direction: column;
  }
  header {
    background: var(--ink);
    color: var(--paper);
    padding: 14px 24px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-bottom: 3px solid var(--accent);
    z-index: 1000;
  }
  h1 {
    font-weight: 800;
    font-size: 22px;
    letter-spacing: -0.02em;
    font-style: italic;
  }
  h1::before { content: "✦ "; color: var(--accent); font-style: normal; }
  h1 em { font-weight: 400; opacity: 0.7; font-size: 14px; margin-left: 8px; }
  .meta {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--accent);
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }
  main { flex: 1; display: flex; position: relative; }
  #map { flex: 1; background: #cfd9dc; }

  aside {
    width: 320px;
    background: var(--paper);
    border-right: 1px solid rgba(26,35,50,0.1);
    overflow-y: auto;
    padding: 20px;
    box-shadow: 2px 0 10px var(--shadow);
    z-index: 500;
  }
  aside h2 {
    font-size: 14px;
    font-family: 'JetBrains Mono', monospace;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--ocean);
    margin-bottom: 14px;
    padding-bottom: 8px;
    border-bottom: 1px dashed rgba(26,35,50,0.2);
  }
  .group-header {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    opacity: 0.6;
    margin: 20px 0 8px 0;
    padding-bottom: 4px;
    border-bottom: 1px dotted rgba(26,35,50,0.15);
  }
  .group-header:first-of-type { margin-top: 0; }
  .point {
    padding: 10px 10px;
    margin-bottom: 4px;
    border-radius: 6px;
    cursor: pointer;
    transition: all 0.2s ease;
    border-left: 3px solid transparent;
    display: flex;
    gap: 10px;
    align-items: flex-start;
  }
  .point:hover {
    background: rgba(42, 89, 105, 0.08);
    transform: translateX(2px);
  }
  .point.cat-ubytovani:hover { border-left-color: var(--cat-ubytovani); }
  .point.cat-turistika:hover { border-left-color: var(--cat-turistika); }
  .point.cat-priroda:hover { border-left-color: var(--cat-priroda); }
  .point.cat-koupani:hover { border-left-color: var(--cat-koupani); }
  .point-marker-mini { flex-shrink: 0; width: 24px; height: 28px; }
  .point-body { flex: 1; min-width: 0; }
  .point-name {
    font-weight: 600;
    font-size: 14px;
    line-height: 1.25;
    margin-bottom: 2px;
  }
  .point-sub {
    font-size: 12px;
    opacity: 0.65;
    font-style: italic;
    line-height: 1.3;
  }

  .leaflet-popup-content-wrapper {
    background: var(--paper) !important;
    border-radius: 6px !important;
    box-shadow: 0 4px 20px rgba(0,0,0,0.25) !important;
    font-family: 'Fraunces', serif !important;
    color: var(--ink) !important;
    padding: 4px !important;
  }
  .leaflet-popup-content { margin: 12px 14px !important; }
  .leaflet-popup-tip { background: var(--paper) !important; }
  .popup-title {
    font-weight: 800;
    font-size: 16px;
    line-height: 1.2;
    margin-bottom: 4px;
  }
  .popup-sub {
    font-size: 13px;
    font-style: italic;
    opacity: 0.75;
    margin-bottom: 6px;
  }
  .popup-category {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-bottom: 8px;
    display: inline-block;
    padding: 3px 8px;
    border-radius: 3px;
    color: white;
  }
  .popup-cat-ubytovani { background: var(--cat-ubytovani); }
  .popup-cat-turistika { background: var(--cat-turistika); }
  .popup-cat-priroda { background: var(--cat-priroda); }
  .popup-cat-koupani { background: var(--cat-koupani); }
  .popup-links {
    display: flex;
    gap: 6px;
    margin-top: 8px;
    padding-top: 8px;
    border-top: 1px dashed rgba(26,35,50,0.2);
    flex-wrap: wrap;
  }
  .popup-links a {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--ocean);
    text-decoration: none;
    padding: 4px 8px;
    border: 1px solid var(--ocean);
    border-radius: 3px;
    transition: all 0.15s ease;
  }
  .popup-links a:hover { background: var(--ocean); color: var(--paper); }

  .custom-marker { filter: drop-shadow(0 3px 6px rgba(0,0,0,0.3)); }

  .leaflet-control-layers {
    background: var(--paper) !important;
    border: 1px solid rgba(26,35,50,0.15) !important;
    border-radius: 6px !important;
    box-shadow: 0 4px 20px var(--shadow) !important;
    font-family: 'JetBrains Mono', monospace !important;
    font-size: 11px !important;
  }
  .leaflet-control-layers-expanded { padding: 10px 14px !important; }
  .leaflet-control-layers label { margin-bottom: 4px !important; color: var(--ink) !important; }
  .leaflet-control-attribution {
    background: rgba(244, 237, 224, 0.92) !important;
    font-family: 'JetBrains Mono', monospace !important;
    font-size: 10px !important;
  }

  .legend {
    position: absolute;
    bottom: 20px;
    right: 20px;
    background: var(--paper);
    padding: 14px 16px;
    border-radius: 6px;
    box-shadow: 0 4px 20px var(--shadow);
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    z-index: 999;
    border: 1px solid rgba(26,35,50,0.1);
  }
  .legend-title {
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    margin-bottom: 8px;
    color: var(--ocean);
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 6px;
  }
  .legend-item:last-child { margin-bottom: 0; }
  .legend-icon { width: 20px; height: 24px; flex-shrink: 0; }

  .toggle-sidebar {
    display: none;
    background: none;
    border: 1px solid var(--paper);
    color: var(--paper);
    padding: 6px 12px;
    cursor: pointer;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    border-radius: 3px;
  }

  @media (max-width: 768px) {
    aside {
      position: absolute; top: 0; left: 0; bottom: 0;
      width: 280px; transform: translateX(-100%);
      transition: transform 0.3s;
    }
    aside.open { transform: translateX(0); }
    .toggle-sidebar { display: block; }
    h1 { font-size: 16px; }
    h1 em { display: none; }
    .meta { display: none; }
    .legend { bottom: 10px; right: 10px; font-size: 10px; padding: 10px 12px; }
  }
</style>
</head>
<body>
<header>
  <h1>Azory 2026 <em>São Miguel & Flores</em></h1>
  <div style="display:flex;gap:12px;align-items:center;">
    <span class="meta">8 bodů · Notion sync</span>
    <button class="toggle-sidebar" onclick="document.querySelector('aside').classList.toggle('open')">≡ Seznam</button>
  </div>
</header>
<main>
  <aside>
    <h2>Itinerář · Body zájmu</h2>
    <div id="point-list"></div>
  </aside>
  <div id="map"></div>
  <div class="legend">
    <div class="legend-title">Legenda</div>
    <div class="legend-item">
      <svg class="legend-icon" viewBox="0 0 40 48"><path d="M20 2 C9 2 2 10 2 20 C2 32 20 46 20 46 C20 46 38 32 38 20 C38 10 31 2 20 2 Z" fill="#2a4a6b" stroke="#f4ede0" stroke-width="2"/><path d="M13 22 L20 14 L27 22 L27 28 L22 28 L22 24 L18 24 L18 28 L13 28 Z" fill="#f4ede0"/></svg>
      Ubytování
    </div>
    <div class="legend-item">
      <svg class="legend-icon" viewBox="0 0 40 48"><path d="M20 2 L36 11 L36 29 L20 38 L4 29 L4 11 Z" fill="#c89935" stroke="#f4ede0" stroke-width="2"/><path d="M13 24 L13 20 L17 20 L17 16 L22 16 L22 22 L28 22 L28 25 L26 25 L26 27 L13 27 Z" fill="#f4ede0"/></svg>
      Turistika
    </div>
    <div class="legend-item">
      <svg class="legend-icon" viewBox="0 0 40 48"><circle cx="20" cy="20" r="18" fill="#1f5c2e" stroke="#f4ede0" stroke-width="2.5"/><path d="M6 30 L14 14 L19 22 L24 10 L34 30 Z" fill="#f4ede0"/><path d="M22 12 Q24 8 26 10 Q23 11 24 14 Q22 13 22 12" fill="#ff9b42"/><circle cx="25" cy="8" r="1.2" fill="#ff9b42"/></svg>
      Příroda
    </div>
    <div class="legend-item">
      <svg class="legend-icon" viewBox="0 0 40 48"><path d="M20 2 L38 20 L20 38 L2 20 Z" fill="#0b7fb8" stroke="#f4ede0" stroke-width="2.5"/><path d="M9 24 Q13 19 17 24 T25 24 T31 24" stroke="#f4ede0" stroke-width="3.5" fill="none" stroke-linecap="round"/><path d="M9 17 Q13 12 17 17 T25 17 T31 17" stroke="#f4ede0" stroke-width="3" fill="none" stroke-linecap="round"/></svg>
      Koupání / termální
    </div>
  </div>
</main>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.js"></script>
<script>
// Data z Notion databáze "Azory - informace (1)"
const points = [
  { name: "Oceanview 2", subtitle: "apartmán v Ponta Delgada",
    lat: 37.7404036, lng: -25.6644561, category: "ubytovani",
    mapyUrl: "https://mapy.com/s/kohecepejo",
    notionId: "345351be095e819988d1f7f4935e06cf" },
  { name: "Green Mountain", subtitle: "dům v Mosteiros",
    lat: 37.8908656, lng: -25.8202775, category: "ubytovani",
    mapyUrl: "https://mapy.com/s/novegepuva",
    notionId: "345351be095e81bb897dface588d4b82" },
  { name: "Casa Delft", subtitle: "vila v centru Furnas",
    lat: 37.7751972, lng: -25.3120789, category: "ubytovani",
    mapyUrl: "https://mapy.com/s/kovececode",
    notionId: "345351be095e81f982d9ee2de260f0df" },
  { name: "Sunrise House Azores", subtitle: "dům na severovýchodě ostrova",
    lat: 37.8160189, lng: -25.1394086, category: "ubytovani",
    mapyUrl: "https://mapy.com/s/kadepokaza",
    notionId: "345351be095e81ce9fb2ddaf7191f70a" },
  { name: "Lagoa do Fogo", subtitle: "kráterové jezero nad mraky",
    lat: 37.7603939, lng: -25.4804244, category: "priroda",
    mapyUrl: "https://mapy.com/s/fulusotaga",
    notionId: "345351be095e8143a448eba87d7bae6f" },
  { name: "Caldeira Velha", subtitle: "termální bazény s vodopádem",
    lat: 37.7822208, lng: -25.5004378, category: "koupani",
    mapyUrl: "https://mapy.com/s/kosupafovo",
    notionId: "345351be095e8151a350d8cc7e7ee657" },
  { name: "Faial da Terra – PR11", subtitle: "džungle, Salto do Cagarrão + Salto do Prego",
    lat: 37.7468383, lng: -25.2010058, category: "turistika",
    mapyUrl: "https://mapy.cz/zakladni?x=-25.2010058&y=37.7468383&z=14",
    notionId: "348351be095e81aa8b13f8c3d7c75b8a" },
  { name: "Corvo – Caldeirão", subtitle: "lodní výlet a pěší výstup",
    lat: 39.6717408, lng: -31.1102033, category: "turistika",
    mapyUrl: "https://mapy.cz/zakladni?x=-31.1102033&y=39.6717408&z=13",
    notionId: "348351be095e8183a41fd18b2e61d02f" }
];

const iconSvg = {
  ubytovani: `<svg viewBox="0 0 40 48" xmlns="http://www.w3.org/2000/svg" width="40" height="48"><path d="M20 2 C9 2 2 10 2 20 C2 32 20 46 20 46 C20 46 38 32 38 20 C38 10 31 2 20 2 Z" fill="#2a4a6b" stroke="#f4ede0" stroke-width="2"/><path d="M13 22 L20 14 L27 22 L27 28 L22 28 L22 24 L18 24 L18 28 L13 28 Z" fill="#f4ede0"/></svg>`,
  turistika: `<svg viewBox="0 0 40 48" xmlns="http://www.w3.org/2000/svg" width="40" height="48"><path d="M20 2 L36 11 L36 29 L20 38 L4 29 L4 11 Z" fill="#c89935" stroke="#f4ede0" stroke-width="2"/><path d="M13 24 L13 20 L17 20 L17 16 L22 16 L22 22 L28 22 L28 25 L26 25 L26 27 L13 27 Z" fill="#f4ede0"/></svg>`,
  priroda: `<svg viewBox="0 0 40 48" xmlns="http://www.w3.org/2000/svg" width="40" height="48"><circle cx="20" cy="20" r="18" fill="#1f5c2e" stroke="#f4ede0" stroke-width="2.5"/><path d="M6 30 L14 14 L19 22 L24 10 L34 30 Z" fill="#f4ede0"/><path d="M22 12 Q24 8 26 10 Q23 11 24 14 Q22 13 22 12" fill="#ff9b42"/><circle cx="25" cy="8" r="1.2" fill="#ff9b42"/><circle cx="23" cy="6" r="0.8" fill="#ff9b42" opacity="0.7"/></svg>`,
  koupani: `<svg viewBox="0 0 40 48" xmlns="http://www.w3.org/2000/svg" width="40" height="48"><path d="M20 2 L38 20 L20 38 L2 20 Z" fill="#0b7fb8" stroke="#f4ede0" stroke-width="2.5"/><path d="M9 24 Q13 19 17 24 T25 24 T31 24" stroke="#f4ede0" stroke-width="3.5" fill="none" stroke-linecap="round"/><path d="M9 17 Q13 12 17 17 T25 17 T31 17" stroke="#f4ede0" stroke-width="3" fill="none" stroke-linecap="round"/></svg>`
};

const iconSvgMini = {
  ubytovani: `<svg viewBox="0 0 40 48" xmlns="http://www.w3.org/2000/svg" width="24" height="28"><path d="M20 2 C9 2 2 10 2 20 C2 32 20 46 20 46 C20 46 38 32 38 20 C38 10 31 2 20 2 Z" fill="#2a4a6b" stroke="#f4ede0" stroke-width="2"/><path d="M13 22 L20 14 L27 22 L27 28 L22 28 L22 24 L18 24 L18 28 L13 28 Z" fill="#f4ede0"/></svg>`,
  turistika: `<svg viewBox="0 0 40 48" xmlns="http://www.w3.org/2000/svg" width="24" height="28"><path d="M20 2 L36 11 L36 29 L20 38 L4 29 L4 11 Z" fill="#c89935" stroke="#f4ede0" stroke-width="2"/><path d="M13 24 L13 20 L17 20 L17 16 L22 16 L22 22 L28 22 L28 25 L26 25 L26 27 L13 27 Z" fill="#f4ede0"/></svg>`,
  priroda: `<svg viewBox="0 0 40 48" xmlns="http://www.w3.org/2000/svg" width="24" height="28"><circle cx="20" cy="20" r="18" fill="#1f5c2e" stroke="#f4ede0" stroke-width="2.5"/><path d="M6 30 L14 14 L19 22 L24 10 L34 30 Z" fill="#f4ede0"/><path d="M22 12 Q24 8 26 10 Q23 11 24 14 Q22 13 22 12" fill="#ff9b42"/><circle cx="25" cy="8" r="1.2" fill="#ff9b42"/></svg>`,
  koupani: `<svg viewBox="0 0 40 48" xmlns="http://www.w3.org/2000/svg" width="24" height="28"><path d="M20 2 L38 20 L20 38 L2 20 Z" fill="#0b7fb8" stroke="#f4ede0" stroke-width="2.5"/><path d="M9 24 Q13 19 17 24 T25 24 T31 24" stroke="#f4ede0" stroke-width="3.5" fill="none" stroke-linecap="round"/><path d="M9 17 Q13 12 17 17 T25 17 T31 17" stroke="#f4ede0" stroke-width="3" fill="none" stroke-linecap="round"/></svg>`
};

const catLabels = {
  ubytovani: "Ubytování",
  turistika: "Turistika",
  priroda: "Příroda",
  koupani: "Koupání / termální"
};

const catOrder = ["ubytovani", "priroda", "koupani", "turistika"];

// Init map
const map = L.map('map', { zoomControl: true }).setView([38.5, -28], 7);

const cartoLayer = L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
  maxZoom: 19, subdomains: 'abcd',
  attribution: '© <a href="https://www.openstreetmap.org/copyright">OSM</a> · © <a href="https://carto.com/attributions">CARTO</a>'
});
const topoLayer = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Topo_Map/MapServer/tile/{z}/{y}/{x}', {
  maxZoom: 19, attribution: 'Turistická mapa © Esri, USGS, NOAA'
});
const satLayer = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
  maxZoom: 19, attribution: 'Satelit © Esri, Maxar'
});

cartoLayer.addTo(map);

L.control.layers({
  "Mapa": cartoLayer,
  "Turistická": topoLayer,
  "Satelit": satLayer
}, null, { position: 'topright', collapsed: false }).addTo(map);

// Markery + seznam
const listEl = document.getElementById('point-list');
const markers = {};

const grouped = {};
points.forEach((p, i) => {
  if (!grouped[p.category]) grouped[p.category] = [];
  grouped[p.category].push({ ...p, index: i });
});

catOrder.forEach(cat => {
  if (!grouped[cat]) return;
  const header = document.createElement('div');
  header.className = 'group-header';
  header.textContent = catLabels[cat] + ' · ' + grouped[cat].length;
  listEl.appendChild(header);

  grouped[cat].forEach(p => {
    const item = document.createElement('div');
    item.className = 'point cat-' + p.category;
    item.innerHTML = `
      <div class="point-marker-mini">${iconSvgMini[p.category]}</div>
      <div class="point-body">
        <div class="point-name">${p.name}</div>
        <div class="point-sub">${p.subtitle}</div>
      </div>
    `;
    item.onclick = () => {
      map.setView([p.lat, p.lng], 13, { animate: true });
      markers[p.index].openPopup();
      if (window.innerWidth < 768) {
        document.querySelector('aside').classList.remove('open');
      }
    };
    listEl.appendChild(item);
  });
});

points.forEach((p, i) => {
  const customIcon = L.divIcon({
    className: 'custom-marker',
    html: iconSvg[p.category],
    iconSize: [40, 48],
    iconAnchor: [20, 46],
    popupAnchor: [0, -46]
  });

  const marker = L.marker([p.lat, p.lng], { icon: customIcon }).addTo(map);
  const popupHtml = `
    <div class="popup-title">${p.name}</div>
    <div class="popup-sub">${p.subtitle}</div>
    <div class="popup-category popup-cat-${p.category}">${catLabels[p.category]}</div>
    <div class="popup-links">
      <a href="${p.mapyUrl}" target="_blank" rel="noopener">Mapy.cz ↗</a>
      <a href="https://www.notion.so/${p.notionId}" target="_blank" rel="noopener">Notion ↗</a>
    </div>
  `;
  marker.bindPopup(popupHtml);
  markers[i] = marker;
});

const bounds = L.latLngBounds(points.map(p => [p.lat, p.lng]));
map.fitBounds(bounds, { padding: [60, 60] });
</script>
</body>
</html>
